<!DOCTYPE html>
<html>
<head>
    <title>Check Tables</title>
</head>
<body>
    <h1>Check Supabase Tables</h1>
    <div id="result"></div>
    
    <!-- Load Supabase from CDN directly -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script>
        // Wait for the script to load
        setTimeout(function() {
            if (typeof window.supabase === 'undefined') {
                document.getElementById('result').innerHTML = 'Supabase not loaded';
                return;
            }
            
            const supabaseClient = window.supabase.createClient(
                'https://eopbqatvianrjkdbypvk.supabase.co',
                'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVvcGJxYXR2aWFucmprZGJ5cHZrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1MzA4OTIsImV4cCI6MjA4OTEwNjg5Mn0.k9_xTbjwRdwAQJ9UgGGsosjLWywzxHuYOq-JbGeII8g'
            );
            
            async function checkTables() {
                const r = document.getElementById('result');
                r.innerHTML = 'Checking tables...<br>';
                
                // Check users
                const { data: users, error: usersError } = await supabaseClient.from('users').select('*');
                r.innerHTML += `Users: ${users?.length || 0} | Error: ${usersError?.message || 'none'}<br>`;
                
                // Check articles
                const { data: articles, error: articlesError } = await supabaseClient.from('articles').select('*');
                r.innerHTML += `Articles: ${articles?.length || 0} | Error: ${articlesError?.message || 'none'}<br>`;
                
                // Check user_uploads
                const { data: uploads, error: uploadsError } = await supabaseClient.from('user_uploads').select('*');
                r.innerHTML += `User Uploads: ${uploads?.length || 0} | Error: ${uploadsError?.message || 'none'}<br>`;
            }
            
            checkTables();
        }, 500);
    </script>
</body>
</html>
